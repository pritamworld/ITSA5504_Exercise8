name: CD - Provision & Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - "app/**"
      - "ansible/**"
      - "terraform/**"
      - ".github/workflows/**"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/flask-hello

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      # ✅ Azure Login (replaces AWS credentials)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        id: tf
        working-directory: terraform
        env:
          TF_VAR_public_key: ${{ secrets.TF_VAR_public_key }}
        run: |
          terraform apply -auto-approve
          IP=$(terraform output -raw public_ip)
          echo "PUBLIC_IP=$IP" >> $GITHUB_ENV
          echo "public_ip=$IP"  >> $GITHUB_OUTPUT

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > id_rsa
          chmod 600 id_rsa

      - name: Run Ansible playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: ansible/site.yml
          inventory: |
            [all]
            ${{ env.PUBLIC_IP }} ansible_user=azureuser ansible_ssh_private_key_file=./id_rsa
          requirements: ""
          options: |
            -e IMAGE_REPO=${{ env.IMAGE_NAME }}
            -e IMAGE_TAG=${{ github.sha }}
            -e GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}